<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Scout - Sign In</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 70px 20px 20px;
        }
   
        .heading {
            margin-top: 30px;
            margin-bottom: 10px;
        }
        .heading h1 {
            font-size: 3rem;
            font-weight: 700;
            line-height: 1.05;
        }
        .heading .highlight {
            color: #c8ff00;
        }
        .subtitle {
            color: #888;
            font-size: 0.85rem;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .form-input-wrapper {
            position: relative;
        }
        .form-input {
            width: 100%;
            padding: 14px 16px;
            background-color: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #666;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        .form-input::placeholder {
            color: #555;
        }
        .form-input:focus {
            outline: none;
            border-color: #c8ff00;
            color: white;
        }
        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .password-toggle:hover {
            color: #c8ff00;
        }
        .form-group.password-group {
            position: relative;
        }
        .forgot-password {
            position: absolute;
            right: 0;
            top: 0;
            font-size: 0.7rem;
            color: #c8ff00;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.3s ease;
            text-decoration: none;
        }
        .forgot-password:hover {
            color: #b3e600;
        }
        .btn-signin {
            width: 100%;
            padding: 14px 20px;
            background-color: #c8ff00;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 30px;
            margin-bottom: 30px;
        }
        .btn-signin:hover {
            background-color: #b3e600;
            transform: translateY(-2px);
        }
        .divider {
            text-align: center;
            color: #666;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }
        .social-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }
        .social-btn {
            flex: 1;
            padding: 12px;
            background-color: transparent;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 70px;
        }
        .social-btn:hover {
            border-color: #c8ff00;
            background-color: #1a1a1a;
        }
        .signup-link {
            text-align: center;
            font-size: 0.9rem;
            color: #666;
        }
        .signup-link a {
            color: #c8ff00;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.3s ease;
        }
        .signup-link a:hover {
            color: #b3e600;
        }
    </style>
</head>
<body>
    <div id="app">
    <div class="container">
        <div class="heading">
            <h1>WELCOME<br><span class="highlight">BACK</span></h1>
        </div>

        <p class="subtitle">
            Sign in to continue your fitness journey.
        </p>

        <form>
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-input" placeholder="SIMONMANEK@EXAMPLE.COM">
            </div>

            <div class="form-group password-group">
                <label class="form-label">
                    Password
                    <a href="forgot-password.html" class="forgot-password">Forgot Password?</a>
                </label>
                <div class="form-input-wrapper">
                    <input type="password" class="form-input" id="password" placeholder="••••••••">
                    <button type="button" class="password-toggle" onclick="togglePassword('password')">👁</button>
                </div>
            </div>

            <button type="submit" class="btn-signin">Sign In</button>
        </form>

        <div class="signup-link">
            Don't have an account? <a href="register.html">Register</a>
        </div>
    </div>

    </div>
    </div>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
