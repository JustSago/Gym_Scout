<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Scout Welcome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0a0a;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            text-align: left;
        }
        .heading {
            margin-bottom: 20px;
        }
        .heading h1 {
            font-size: 3rem;
            font-weight: 700;
            line-height: 1.1;
        }
        .heading .highlight {
            color: #c8ff00;
        }
        .description {
            color: #888;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        .stats {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
            width: 100%;
        }
        .stat-box {
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px 15px;
            text-align: center;
            flex: 1;
        }
        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
        }
        .stat-label {
            font-size: 0.7rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn {
            padding: 16px 32px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary {
            background-color: #c8ff00;
            color: #000;
            border: none;
        }
        .btn-primary:hover {
            background-color: #b3e600;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background-color: transparent;
            color: white;
            border: 1px solid #333;
            margin-bottom: 50px;
        }
        .btn-secondary:hover {
            background-color: #1a1a1a;
            border-color: #555;
        }
        .arrow {
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div id="app">
    <div class="container">
        <div class="heading">
            <h1>FIND<br>YOUR<br><span class="highlight">IDEAL GYM</span></h1>
        </div>

        <p class="description">
            Discover gyms that match your goals.<br>Read honest reviews, share yours, and keep improving.
        </p>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-number">100+</div>
                <div class="stat-label">Global Gyms</div>
            </div>
            <div class="stat-box">
                <div class="stat-number">5K</div>
                <div class="stat-label">Active Scouts</div>
            </div>
        </div>

        <div class="buttons">
            <button class="btn btn-primary" onclick="window.location.href='register.html'">
                GET STARTED <span class="arrow">→</span>
            </button>
            <button class="btn btn-secondary" onclick="window.location.href='signin.html'">
                SIGN IN <span class="arrow">→</span>
            </button>
        </div>
    </div>
    </div>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
