<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Scout - Forgot Password</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top, rgba(200, 255, 0, 0.12), transparent 35%),
                        linear-gradient(180deg, #050505 0%, #121212 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }
        .container {
            width: 100%;
            max-width: 380px;
            background: #111111;
            border-radius: 32px;
            padding: 40px 28px;
            box-shadow: 0 28px 70px rgba(0, 0, 0, 0.35);
        }
        .heading h1 {
            font-size: clamp(2.4rem, 6vw, 3.6rem);
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -0.04em;
            margin-bottom: 30px;
        }
        .heading .highlight {
            color: #c8ff00;
            display: block;
        }
        .subtitle {
            color: #888;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 34px;
        }
        .form-group {
            margin-bottom: 22px;
        }
        .form-label {
            display: block;
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-weight: 700;
        }
        .form-input {
            width: 100%;
            padding: 16px 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            color: #fff;
            font-size: 1rem;
            transition: border-color 0.25s ease, background-color 0.25s ease;
        }
        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }
        .form-input:focus {
            outline: none;
            border-color: #c8ff00;
            background: rgba(255, 255, 255, 0.06);
        }
        .btn-action {
            width: 100%;
            padding: 16px 18px;
            background: linear-gradient(90deg, #d5ff00, #b5e500);
            border: none;
            border-radius: 14px;
            color: #000;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.2s ease, filter 0.2s ease;
        }
        .btn-action:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }
        .bottom-text {
            text-align: center;
            margin-top: 30px;
            font-size: 0.95rem;
            color: #888;
            margin-bottom: 80px;
        }
        .bottom-text a {
            color: #c8ff00;
            text-decoration: none;
            font-weight: 700;
        }
        .bottom-text a:hover {
            color: #b3e600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="heading">
            <h1>FORGOT<br><span class="highlight">PASSWORD</span></h1>
        </div>
        <p class="subtitle">
            Forgot your password? Enter your email and we'll send you a reset link.
        </p>
        <form>
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input id="email" type="email" class="form-input" placeholder="SIMONMANEK@EXAMPLE.COM">
            </div>
            <button type="submit" class="btn-action">Send recovery link</button>
        </form>
        <p class="bottom-text">
            Remember your password? <a href="signin.html">Sign In</a>
        </p>
    </div>
</body>
</html>
